services:
  mongo:
    image: mongo:7.0
    container_name: sentinel-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: sentinel
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentinel-network
  mongo-express:
    image: mongo-express:1
    container_name: sentinel-mongo-express
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017/sentinel
      ME_CONFIG_BASICAUTH: "false"

  redis:
    image: redis:7.2-alpine
    container_name: sentinel-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentinel-network

  sentinel-engine:
    build:
      context: ./sentinel-engine
      dockerfile: Dockerfile
    container_name: sentinel-engine
    ports:
      - "9090:8080"
    environment:
      - UPSTREAM_URL=${UPSTREAM_URL:-http://nginx:80}
      - UPSTREAM_HOST=${UPSTREAM_HOST:-3cket.local}
      - REDIS_ADDR=redis:6379
      - MONGO_URI=mongodb://mongo:27017/sentinel
      - LOG_TTL_DAYS=${LOG_TTL_DAYS:-4}
      - LOG_BODY_MAX_BYTES=${LOG_BODY_MAX_BYTES:-1048576}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - sentinel-network
      - 3cket-intra

  sentinel-api:
    build:
      context: ./sentinel-api
      dockerfile: Dockerfile
    container_name: sentinel-api
    ports:
      - "8090:8090"
    environment:
      - MONGO_URI=mongodb://mongo:27017/sentinel
      - REDIS_ADDR=redis:6379
      - SENTINEL_ADMIN_TOKEN=${SENTINEL_ADMIN_TOKEN:-changeme}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - sentinel-network

  sentinel-brain:
    build:
      context: ./sentinel-brain
      dockerfile: Dockerfile
    container_name: sentinel-brain
    restart: unless-stopped
    environment:
      - MONGO_URI=mongodb://mongo:27017/sentinel
      - REDIS_ADDR=redis:6379
      - POLL_INTERVAL_SEC=${POLL_INTERVAL_SEC:-5}
      - AI_AUTOBLOCK=${AI_AUTOBLOCK:-false}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      sentinel-api:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - sentinel-network

  sentinel-dashboard:
    build:
      context: ./sentinel-dashboard
      dockerfile: Dockerfile
    container_name: sentinel-dashboard
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8090
      - VITE_ADMIN_TOKEN=${SENTINEL_ADMIN_TOKEN:-changeme}
    depends_on:
      - sentinel-api
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - sentinel-network

volumes:
  mongo_data:
  redis_data:

networks:
  sentinel-network:
    driver: bridge
  3cket-intra:
    external: true
    name: 3cket-intra
